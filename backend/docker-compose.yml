version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_DB: healthcare_db
      POSTGRES_USER: healthcare_user
      POSTGRES_PASSWORD: healthcare_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  api:
    build: .
    container_name: healthcare_api
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://healthcare_user:healthcare_password@postgres:5432/healthcare_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads:/app/uploads
    command: flask run --host=0.0.0.0

  # Celery Worker
  celery:
    build: .
    container_name: healthcare_celery
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://healthcare_user:healthcare_password@postgres:5432/healthcare_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  celery_beat:
    build: .
    container_name: healthcare_celery_beat
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://healthcare_user:healthcare_password@postgres:5432/healthcare_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  uploads:

networks:
  default:
    name: healthcare_network
